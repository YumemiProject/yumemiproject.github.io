name: Deploy

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [app-release]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare deploy bundle
        run: |
          rm -rf .vitepress/deploy
          mkdir -p .vitepress/deploy
          
          # Copy all contents from dist to deploy root
          # shopt dotglob ensures hidden files like .nojekyll are included
          shopt -s dotglob
          cp -r .vitepress/dist/* .vitepress/deploy/
          
          # Create redirect folder for backward compatibility
          mkdir -p .vitepress/deploy/usagi
          cat > .vitepress/deploy/usagi/index.html <<'HTML'
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8">
              <title>Redirecting...</title>
              <script>
                (function() {
                  var p = window.location.pathname;
                  var t = p.startsWith("/usagi/") ? p.substring(6) : (p === "/usagi" ? "/" : p);
                  window.location.replace(t + window.location.search + window.location.hash);
                })();
              </script>
              <meta http-equiv="refresh" content="0;url=/">
            </head>
            <body>Redirecting...</body>
          </html>
          HTML

          # Final touch to ensure GitHub Pages serves underscore folders
          touch .vitepress/deploy/.nojekyll
          
          # Ensure CNAME is at deploy root for the custom domain
          cp CNAME .vitepress/deploy/CNAME

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .vitepress/deploy
          git-config-name: usagi-bot
          git-config-email: bot@yumemi.moe
