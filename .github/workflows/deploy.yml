name: Deploy

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [app-release]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare deploy bundle
        run: |
          rm -rf .vitepress/deploy
          mkdir -p .vitepress/deploy
          # Copy everything to root
          rsync -a --delete .vitepress/dist/ .vitepress/deploy/

          # Create a redirect for the old /usagi/ path
          mkdir -p .vitepress/deploy/usagi
          cat > .vitepress/deploy/usagi/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0;url=/">
              <script>
                (function () {
                  var path = window.location.pathname;
                  var target = path.replace(/^\/usagi\//, "/") + window.location.search + window.location.hash;
                  window.location.replace(target);
                })();
              </script>
              <title>Redirecting...</title>
            </head>
            <body>
              Redirecting to <a href="/">home</a>...
            </body>
          </html>
          HTML

          # Simplified root 404.html for SPA-like routing if needed, 
          # otherwise VitePress will use its own 404.html
          cp .vitepress/dist/404.html .vitepress/deploy/404.html

          # Ensure GitHub Pages doesn't ignore underscored folders
          touch .vitepress/deploy/.nojekyll

          cp CNAME .vitepress/deploy/CNAME

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .vitepress/deploy
          git-config-name: usagi-bot
          git-config-email: bot@yumemi.moe
