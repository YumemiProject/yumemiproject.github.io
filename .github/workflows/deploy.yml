name: Deploy

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [app-release]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare deploy bundle
        run: |
          rm -rf .vitepress/deploy
          mkdir -p .vitepress/deploy/usagi
          rsync -a --delete .vitepress/dist/ .vitepress/deploy/usagi/

          cat > .vitepress/deploy/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width,initial-scale=1">
              <title>Redirecting to Usagi</title>
              <meta http-equiv="refresh" content="0;url=/usagi/">
              <script>
                (function () {
                  var target = "/usagi/" + window.location.search + window.location.hash;
                  window.location.replace(target);
                })();
              </script>
            </head>
            <body>
              Redirecting to <a href="/usagi/">/usagi/</a>...
            </body>
          </html>
          HTML

          cat > .vitepress/deploy/404.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width,initial-scale=1">
              <title>Redirecting to Usagi</title>
              <script>
                (function () {
                  var path = window.location.pathname.startsWith("/") ? window.location.pathname : "/" + window.location.pathname;
                  var target = "/usagi" + path + window.location.search + window.location.hash;
                  window.location.replace(target);
                })();
              </script>
            </head>
            <body>
              Redirecting...
            </body>
          </html>
          HTML

          cat > .vitepress/deploy/robots.txt <<'TXT'
          User-agent: *
          Sitemap: https://yumemi.moe/usagi/sitemap.xml
          TXT

          cp CNAME .vitepress/deploy/CNAME

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .vitepress/deploy
          git-config-name: yakabot
          git-config-email: yakateam@proton.me
