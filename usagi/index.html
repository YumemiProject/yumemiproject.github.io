<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      (function() {
        var p = window.location.pathname;
        var t = p.startsWith("/usagi/") ? p.substring(6) : (p === "/usagi" ? "/" : p);
        window.location.replace(t + window.location.search + window.location.hash);
      })();
    </script>
    <meta http-equiv="refresh" content="0;url=/">
  </head>
  <body>Redirecting...</body>
</html>
